<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Context - Node Unreachable</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800;900&family=Rajdhani:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <script>
      // STRICT Context Design System
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              display: ["Rajdhani", "sans-serif"],
              sans: ["Inter", "sans-serif"],
              mono: ["Fira Code", "monospace"],
            },
            colors: {
              light: {
                bg: "#F8F9FA",
                surface: "#FFFFFF",
                primary: "#103766", // Deep Blue
                accent: "#FF7E5F", // Orange
                text: "#242C34",
                border: "#E2E8F0",
              },
              dark: {
                bg: "#0B0B0D", // Deep Black
                surface: "#18181B",
                primary: "#8B5CF6", // Electric Violet
                secondary: "#3B82F6", // Blue Accent
                text: "#E0E0E6",
                border: "#27272A",
              },
            },
            animation: {
              "glitch-pulse": "glitch 3s ease-in-out infinite",
              typewriter: "typing 2s steps(40, end)",
            },
            keyframes: {
              glitch: {
                "0%, 100%": { opacity: 1 },
                "50%": { opacity: 0.4 },
                "70%": { opacity: 0.8 },
                "80%": { opacity: 0.2 },
              },
              typing: {
                from: { width: "0" },
                to: { width: "100%" },
              },
            },
          },
        },
      };
    </script>

    <script>
      if (
        localStorage.theme === "dark" ||
        (!("theme" in localStorage) &&
          window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
    </script>

    <style>
      .bg-grid {
        background-size: 40px 40px;
        background-image:
          linear-gradient(
            to right,
            rgba(128, 128, 128, 0.05) 1px,
            transparent 1px
          ),
          linear-gradient(
            to bottom,
            rgba(128, 128, 128, 0.05) 1px,
            transparent 1px
          );
      }

      .dash-flow {
        stroke-dasharray: 6 6;
        animation: march 20s linear infinite;
        will-change: stroke-dashoffset;
      }

      @keyframes march {
        to {
          stroke-dashoffset: -200;
        }
      }

      .fill-icon {
        font-variation-settings: "FILL" 1;
      }
    </style>
  </head>
  <body
    class="bg-light-bg dark:bg-dark-bg text-light-text dark:text-dark-text min-h-screen flex items-center justify-center font-sans overflow-hidden bg-grid transition-colors duration-300 selection:bg-light-primary selection:text-white dark:selection:bg-dark-primary dark:selection:text-black"
  >
    <button
      onclick="document.documentElement.classList.toggle('dark')"
      class="absolute top-6 right-8 p-2 text-light-text/50 dark:text-dark-text/50 hover:bg-light-surface dark:hover:bg-dark-surface rounded-lg transition-colors border border-transparent hover:border-light-border dark:hover:border-dark-border z-50"
    >
      <span class="material-symbols-rounded">contrast</span>
    </button>

    <main
      class="relative z-10 flex flex-col items-center justify-center w-full max-w-2xl p-6"
    >
      <div
        class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none select-none -z-10"
      >
        <h1
          class="text-[12rem] md:text-[18rem] font-black text-light-border dark:text-white/5 leading-none tracking-tighter mix-blend-multiply dark:mix-blend-screen font-display"
        >
          404
        </h1>
      </div>

      <div
        class="bg-light-surface/95 dark:bg-dark-surface/95 border border-light-border dark:border-dark-border rounded-3xl shadow-2xl p-8 md:p-12 w-full flex flex-col items-center text-center backdrop-blur-xl relative overflow-hidden transition-colors duration-300"
      >
        <div
          class="absolute top-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-red-500 dark:via-red-500 to-transparent opacity-60"
        ></div>

        <div
          class="w-32 h-32 mb-8 text-red-500 dark:text-red-500 animate-glitch-pulse drop-shadow-[0_0_15px_rgba(239,68,68,0.3)]"
        >
          <svg
            viewBox="0 0 100 100"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            class="w-full h-full"
          >
            <path
              d="M25 25 C 25 25, 40 45, 50 50"
              stroke="currentColor"
              stroke-opacity="0.5"
              stroke-width="4"
              stroke-linecap="round"
              class="dash-flow"
            />
            <path
              d="M75 25 C 75 25, 60 45, 50 50"
              stroke="currentColor"
              stroke-opacity="0.5"
              stroke-width="4"
              stroke-linecap="round"
              class="dash-flow"
            />
            <path
              d="M50 80 C 50 80, 50 65, 50 50"
              stroke="currentColor"
              stroke-opacity="0.5"
              stroke-width="4"
              stroke-linecap="round"
              class="dash-flow"
            />

            <circle
              cx="25"
              cy="25"
              r="6"
              stroke="currentColor"
              stroke-width="2"
              stroke-opacity="0.6"
            />
            <circle
              cx="75"
              cy="25"
              r="6"
              stroke="currentColor"
              stroke-width="2"
              stroke-opacity="0.6"
            />
            <circle
              cx="50"
              cy="80"
              r="6"
              stroke="currentColor"
              stroke-width="2"
              stroke-opacity="0.6"
            />
            <circle
              cx="50"
              cy="50"
              r="12"
              stroke="currentColor"
              stroke-width="3"
              stroke-dasharray="4 4"
              class="dash-flow"
            />
            <circle cx="50" cy="50" r="4" fill="currentColor" />
          </svg>
        </div>

        <h2
          class="text-3xl md:text-4xl font-black tracking-tight text-light-text dark:text-white mb-3"
        >
          Semantic Void
        </h2>
        <p
          class="text-sm md:text-base text-light-text/70 dark:text-dark-text/70 font-medium max-w-sm mb-8"
        >
          The node you are trying to access has been disconnected, archived, or
          never existed in the engine network.
        </p>

        <div
          class="w-full bg-light-bg dark:bg-[#0B0B0D] border border-light-border dark:border-white/10 rounded-xl p-5 text-left font-mono text-xs mb-8 shadow-inner overflow-hidden transition-colors duration-300"
        >
          <div
            class="flex items-center gap-2 mb-3 border-b border-light-border dark:border-white/10 pb-3"
          >
            <div
              class="w-2.5 h-2.5 rounded-full bg-light-border dark:bg-white/10"
            ></div>
            <div
              class="w-2.5 h-2.5 rounded-full bg-light-border dark:bg-white/10"
            ></div>
            <div
              class="w-2.5 h-2.5 rounded-full bg-red-500 animate-pulse shadow-[0_0_8px_rgba(239,68,68,0.8)]"
            ></div>
            <span
              class="ml-2 text-light-text/50 dark:text-white/40 tracking-widest uppercase font-bold"
              >System.Log</span
            >
          </div>
          <div
            class="space-y-2 text-light-text/80 dark:text-white/80 font-medium"
          >
            <p>
              <span class="text-light-primary dark:text-dark-primary font-bold"
                >></span
              >
              ping target_node_route...
            </p>
            <p>
              <span class="text-light-primary dark:text-dark-primary font-bold"
                >></span
              >
              resolving semantic path...
            </p>
            <p
              class="text-red-600 dark:text-red-500 font-bold mt-2 overflow-hidden whitespace-nowrap animate-typewriter bg-red-50 dark:bg-red-500/10 inline-block px-2 py-0.5 rounded"
            >
              [ERR_404] TIMEOUT: Path undefined.
            </p>
          </div>
        </div>

        <div class="flex flex-col sm:flex-row gap-4 w-full justify-center mt-2">
          <a
            href="./05-Dashboard.html"
            class="bg-light-primary dark:bg-dark-primary text-white dark:text-black px-8 py-3.5 rounded-xl font-black font-mono text-sm tracking-widest uppercase shadow-md hover:scale-105 active:scale-95 transition-all flex items-center justify-center gap-2"
          >
            <span class="material-symbols-rounded text-[18px]"
              >power_settings_new</span
            >
            Reboot Engine
          </a>
          <a
            href="#"
            class="px-8 py-3.5 rounded-xl border border-light-border dark:border-white/10 bg-white dark:bg-dark-surface text-light-text/70 dark:text-dark-text/70 font-bold font-mono text-sm tracking-widest uppercase hover:bg-light-bg dark:hover:bg-white/5 hover:text-light-text dark:hover:text-white transition-all flex items-center justify-center gap-2 shadow-sm"
          >
            View Diagnostics
          </a>
        </div>
      </div>
    </main>
  </body>
</html>
