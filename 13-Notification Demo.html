<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Context - Notification Engine</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;600&family=Inter:wght@400;500;600;700;800&family=Rajdhani:wght@500;600;700&display=swap"
      rel="stylesheet"
    />

    <script>
      // RESTORED: Exact Context Design System Configuration
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            fontFamily: {
              display: ["Rajdhani", "sans-serif"],
              sans: ["Inter", "sans-serif"],
              mono: ["Fira Code", "monospace"],
            },
            colors: {
              light: {
                bg: "#F8F9FA",
                surface: "#FFFFFF",
                primary: "#103766", // Deep Blue
                accent: "#FF7E5F", // Orange
                text: "#242C34",
                border: "#E2E8F0",
              },
              dark: {
                bg: "#0B0B0D", // Deep Black
                surface: "#18181B",
                primary: "#8B5CF6", // Electric Violet
                secondary: "#3B82F6", // Blue
                text: "#E0E0E6",
                border: "#27272A",
              },
            },
          },
        },
      };
    </script>

    <script>
      if (
        localStorage.theme === "dark" ||
        (!("theme" in localStorage) &&
          window.matchMedia("(prefers-color-scheme: dark)").matches)
      ) {
        document.documentElement.classList.add("dark");
      } else {
        document.documentElement.classList.remove("dark");
      }
    </script>

    <style>
      /* Spring physics for entry */
      .toast-enter {
        animation: slideIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        will-change: transform, opacity;
      }
      .toast-exit {
        animation: slideOut 0.3s cubic-bezier(0.5, 0, 0.9, 0.2) forwards;
        will-change: transform, opacity;
      }
      .progress-shrink {
        transform-origin: left;
        animation: shrinkBar 4s linear forwards;
        will-change: transform;
      }

      @keyframes slideIn {
        0% {
          transform: translateX(120%) scale(0.95);
          opacity: 0;
        }
        100% {
          transform: translateX(0) scale(1);
          opacity: 1;
        }
      }
      @keyframes slideOut {
        0% {
          transform: translateX(0) scale(1);
          opacity: 1;
        }
        100% {
          transform: translateX(120%) scale(0.95);
          opacity: 0;
        }
      }
      @keyframes shrinkBar {
        0% {
          transform: scaleX(1);
        }
        100% {
          transform: scaleX(0);
        }
      }

      .bg-grid {
        background-size: 40px 40px;
        background-image:
          linear-gradient(
            to right,
            rgba(128, 128, 128, 0.08) 1px,
            transparent 1px
          ),
          linear-gradient(
            to bottom,
            rgba(128, 128, 128, 0.08) 1px,
            transparent 1px
          );
      }

      .fill-icon {
        font-variation-settings: "FILL" 1;
      }
    </style>
  </head>
  <body
    class="bg-light-bg dark:bg-dark-bg text-light-text dark:text-dark-text min-h-screen flex items-center justify-center font-sans overflow-hidden bg-grid transition-colors duration-300 selection:bg-light-primary selection:text-white dark:selection:bg-dark-primary dark:selection:text-black"
  >
    <div
      class="z-10 bg-white/90 dark:bg-dark-surface/90 backdrop-blur-xl p-10 rounded-3xl border border-light-border dark:border-white/10 shadow-2xl max-w-md text-center transition-colors"
    >
      <div
        class="flex items-center justify-center gap-2 mb-2 text-light-primary dark:text-white"
      >
        <span class="material-symbols-rounded text-[28px] fill-icon"
          >notifications_active</span
        >
        <h2 class="text-3xl font-black tracking-tight font-display">
          Engine Config
        </h2>
      </div>
      <p
        class="text-sm font-medium text-light-text/60 dark:text-dark-text/60 mb-10"
      >
        Trigger system notifications below.
      </p>

      <div class="flex flex-col gap-4">
        <button
          onclick="spawnToast('success')"
          class="bg-emerald-50 dark:bg-emerald-500/10 hover:bg-emerald-100 dark:hover:bg-emerald-500/20 text-emerald-700 dark:text-emerald-400 border border-emerald-200 dark:border-emerald-500/30 px-6 py-3.5 rounded-xl font-bold font-mono text-sm tracking-widest uppercase transition-all active:scale-95 flex items-center justify-center gap-2"
        >
          <span class="material-symbols-rounded text-[18px]">check_circle</span>
          Trigger Success
        </button>
        <button
          onclick="spawnToast('process')"
          class="bg-light-primary/5 dark:bg-dark-primary/10 hover:bg-light-primary/10 dark:hover:bg-dark-primary/20 text-light-primary dark:text-dark-primary border border-light-primary/20 dark:border-dark-primary/30 px-6 py-3.5 rounded-xl font-bold font-mono text-sm tracking-widest uppercase transition-all active:scale-95 flex items-center justify-center gap-2"
        >
          <span class="material-symbols-rounded text-[18px]">memory</span>
          Trigger Process
        </button>
        <button
          onclick="spawnToast('error')"
          class="bg-red-50 dark:bg-red-500/10 hover:bg-red-100 dark:hover:bg-red-500/20 text-red-600 dark:text-red-400 border border-red-200 dark:border-red-500/30 px-6 py-3.5 rounded-xl font-bold font-mono text-sm tracking-widest uppercase transition-all active:scale-95 flex items-center justify-center gap-2"
        >
          <span class="material-symbols-rounded text-[18px]">warning</span>
          Trigger Error
        </button>
      </div>

      <button
        onclick="document.documentElement.classList.toggle('dark')"
        class="mt-10 px-4 py-2 border border-light-border dark:border-white/10 text-xs font-bold font-mono text-light-text/60 dark:text-dark-text/60 hover:bg-light-bg dark:hover:bg-white/5 rounded-lg transition-colors"
      >
        Toggle Theme
      </button>
    </div>

    <div
      id="toast-container"
      class="fixed bottom-0 right-0 p-6 flex flex-col gap-4 z-50 pointer-events-none w-full max-w-sm"
    ></div>

    <script>
      // Semantic Mapping: Brand colors for logic, Semantic colors for states
      const toastTypes = {
        success: {
          icon: "check_circle",
          title: "SYNC COMPLETE",
          message: "Local node data verified successfully.",
          iconClass: "text-emerald-600 dark:text-emerald-400",
          barClass: "bg-emerald-500 dark:bg-emerald-500",
          pulse: false,
        },
        process: {
          icon: "memory",
          title: "ANALYZING FILE",
          message: "Extracting semantic structure from PDF.",
          iconClass: "text-light-primary dark:text-dark-primary", // Brand Primary
          barClass: "bg-light-primary dark:bg-dark-primary",
          pulse: true,
        },
        error: {
          icon: "warning",
          title: "CONNECTION LOST",
          message: "Failed to reach the main semantic core.",
          iconClass: "text-red-600 dark:text-red-500",
          barClass: "bg-red-500 dark:bg-red-500",
          pulse: false,
        },
      };

      function spawnToast(type) {
        const config = toastTypes[type];
        const container = document.getElementById("toast-container");
        const hash = Math.random().toString(36).substring(2, 8).toUpperCase();

        const toast = document.createElement("div");
        // Glassmorphism effect applied
        toast.className = `pointer-events-auto w-full bg-white/95 dark:bg-[#18181B]/95 backdrop-blur-xl border border-light-border dark:border-white/10 rounded-2xl shadow-2xl overflow-hidden toast-enter flex flex-col relative`;

        toast.innerHTML = `
          <div class="p-5 flex gap-4">
            <div class="mt-0.5 ${config.iconClass} ${config.pulse ? "animate-pulse" : ""}">
              <span class="material-symbols-rounded fill-icon">${config.icon}</span>
            </div>
            
            <div class="flex-1">
              <div class="flex justify-between items-start mb-1">
                <h4 class="font-mono text-xs font-bold tracking-widest text-light-text dark:text-white">${config.title}</h4>
                <span class="font-mono text-[9px] text-light-text/50 dark:text-dark-text/50 border border-light-border dark:border-white/10 px-1.5 py-0.5 rounded uppercase tracking-widest font-bold bg-light-bg dark:bg-white/5">ID:${hash}</span>
              </div>
              <p class="text-sm text-light-text/80 dark:text-dark-text/80 leading-relaxed font-medium">${config.message}</p>
            </div>

            <button class="text-light-text/40 dark:text-dark-text/50 hover:text-light-text dark:hover:text-white transition-colors self-start p-1 bg-light-bg dark:bg-white/5 rounded-lg border border-transparent hover:border-light-border dark:hover:border-white/10" onclick="dismissToast(this.parentElement.parentElement)">
              <span class="material-symbols-rounded text-sm">close</span>
            </button>
          </div>

          <div class="h-1 w-full bg-light-border dark:bg-white/5 overflow-hidden relative">
            <div class="absolute top-0 left-0 h-full w-full ${config.barClass} progress-shrink"></div>
          </div>
        `;

        container.appendChild(toast);

        // Auto-dismiss after 4 seconds
        setTimeout(() => {
          if (document.body.contains(toast)) {
            dismissToast(toast);
          }
        }, 4000);
      }

      function dismissToast(toastElement) {
        toastElement.classList.remove("toast-enter");
        toastElement.classList.add("toast-exit");
        setTimeout(() => {
          if (toastElement.parentNode) {
            toastElement.parentNode.removeChild(toastElement);
          }
        }, 300); // Matches CSS transition duration
      }
    </script>
  </body>
</html>
